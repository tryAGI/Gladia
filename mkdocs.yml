site_name: Gladia .NET Documentation
site_description: Documentation for the tryAGI .NET SDK for Gladia.
site_url: https://tryagi.github.io/Gladia/
repo_url: https://github.com/tryAGI/Gladia
repo_name: tryAGI/Gladia
edit_uri: edit/main/docs/
nav:
- Overview: index.md
- Guides:
  - Microsoft.Extensions.AI: guides/meai.md
# EXAMPLES:START
- Examples:
  - List Transcription Jobs: examples/list-transcription-jobs.md
  - Speech To Text Client Get Text Async: examples/speech-to-text-client-get-text-async.md
  - Speech To Text Client Get Service Metadata: examples/speech-to-text-client-get-service-metadata.md
  - Speech To Text Client Get Service Self: examples/speech-to-text-client-get-service-self.md
# EXAMPLES:END

theme:
  name: tryagi
  favicon: 'media/icon128.png'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
